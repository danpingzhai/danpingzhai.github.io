<style>
*, ::after, ::before {
    box-sizing: border-box;
}
body {
    font-size: 20px;
    color: rgb(55, 53, 47);
    margin: 0;
    margin: 0 auto;
    max-width: 1080px;
    width: 100%;
}
header {max-width: 100%;}

a {
    color: #007bff;
    transition: background-color .2s ease-out;
    background-color:hsla(209,100%,52%,.05);
    border-radius:5px;
    padding:0 .2em;
    margin:0 .2em;
    text-decoration:none;
}
a:hover{
    background-color:hsla(50,100%,50%,.51);
    color:#806a00;
    text-decoration:none
}

.page-cover-image {
	display: block;
	object-fit: cover;
	width: 100%!important;
	
}
.photo {
    box-shadow: 0 1px 2px rgba(0,0,0,0.15);
    border-radius: 3px;
}
@media only screen and (max-device-width: 959px) {
    .page-cover-image {
        max-height: 380px;
        object-position:top;
    }
    .photo {
        width: 100%;
        margin-top: 50px;
        margin-bottom: 50px;
    }
    #placeholder {
        height: 30px;
    }
}
@media only screen and (min-device-width: 960px) {
    .page-cover-image {
        max-height: 350px;
        object-position: top;
    }
    #placeholder {
        height: 100px;
    }
    .photo {
        position: relative;
        display: inline-block;
        height: 352px;
        margin: 10px;
        background-color: #fff;
        transition: all 0.3s ease-in-out;
        box-shadow: rgba(0, 0, 0, 0.1) 0px 4px 12px;
    }
    .photo:hover {
        transform: scale(1.05, 1.05);
        box-shadow: rgba(0, 0, 0, 0.25) 0px 54px 55px, rgba(0, 0, 0, 0.12) 0px -12px 30px, rgba(0, 0, 0, 0.12) 0px 4px 6px, rgba(0, 0, 0, 0.17) 0px 12px 13px, rgba(0, 0, 0, 0.09) 0px -3px 5px;
    }
}

</style>
